name: Deploy Documentation

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

# Workflow-based Pages deployment (build_type: workflow): the site is
# built once, uploaded as the official Pages artifact, and deployed
# atomically by actions/deploy-pages — no gh-pages branch, no legacy
# Jekyll pipeline.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Node is needed only for the Stage-2 web-UI build appended below; the
      # MkDocs + JupyterLite build above is pure-Python and unaffected.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-docs.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt
          pip install -e ".[qt,soundcard]"

      - name: Build documentation + JupyterLite
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mkdocs build --strict
          pip wheel . peakutils --no-deps -w lite/pypi/
          (cd lite && jupyter lite build --output-dir ../site/lite)

      # Build the Stage-2 web UI and add it to the published tree at /app/.
      # ADDITIVE — mkdocs already populated site/ (and site/lite); this only
      # writes site/app/, leaving the docs + JupyterLite output untouched.
      # Vendoring is regenerated here (public/pyodide, public/pypi are
      # gitignored): npm ci -> fetch-pyodide (stage runtime from node_modules)
      # -> build-wheels (pip-wheels pydvma+peakutils; isolated build, no
      # editable install needed) -> npm run build (vite copies public/* into
      # dist/). The app is served under /pydvma/app/ and uses relative asset
      # paths (vite base: './'), so no base-path rewrite is required. The whole
      # site (docs + lite + app) is deployed as ONE Pages artifact by the
      # deploy job below — a single atomic publish, so there is no gh-pages
      # push / Pages rate-limit concern here.
      - name: Build web UI (Stage 2 app)
        # Skipped on PRs: the artifact is only uploaded on push/dispatch (below),
        # so building the app on a PR produces output that is discarded. webui.yml
        # already gates webui changes on their own PRs. This just avoids the
        # redundant npm ci + pyodide fetch + wheel build on every docs PR.
        if: github.event_name != 'pull_request'
        run: |
          (cd webui && npm ci && ./scripts/fetch-pyodide.sh && ./scripts/build-wheels.sh && npm run build)
          mkdir -p site/app && cp -r webui/dist/* site/app/

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

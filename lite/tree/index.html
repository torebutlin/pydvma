<!DOCTYPE html>
<html>
<head>
    <title>Jupyter Notebook - Tree</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="Description" content="WASM powered Jupyter running in the browser.">
    <link rel="manifest" href="../manifest.webmanifest">
    <link id="jupyter-lite-main" rel="preload" href="../build/tree/bundle.js?_=2993846" main="index" as="script">
    <script id="jupyter-config-data" type="application/json" data-jupyter-lite-root="..">
      {}
    </script>
    <script>
      (async function () {
        const { pathname, origin, search, hash } = window.location;
        if (pathname.match(/(index.html|\/?)$/) == null) {
          window.location.href = `${origin}${pathname}/${search}${hash}`;
          return;
        }
        await import(
          '../config-utils.js?_=2993846'
        );
      }.call(this));
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        transition: background-color 0.3s ease;
      }

      body {
        background-color: #fff;
        color: #000;
      }

      body.jp-mod-dark {
        background-color: #111;
        color: #fff;
      }

      /*
       * Loading indicator that mirrors JupyterLab's splash screen visual
       * design for a clean transition. The SVG, orbit dimensions, planet
       * sizes, and planet colors below are adapted from:
       * https://github.com/jupyterlab/jupyterlab/blob/main/packages/apputils-extension/style/splash.css
       */

      #jupyterlite-loading-indicator {
        z-index: 1000;
        position: fixed;
        overflow: hidden;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.5s ease-out;
        display: none;
        background-color: white;
      }

      body.jp-mod-dark #jupyterlite-loading-indicator {
        background-color: #212121;
      }

      #jupyterlite-loading-indicator.hidden {
        animation: jupyterlite-fade-out 0.5s ease-out forwards;
        pointer-events: none;
      }

      #jupyterlite-loading-indicator:not(.hidden) {
        opacity: 1;
        display: block;
      }

      #jupyterlite-galaxy {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #jupyterlite-main-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      #jupyterlite-main-logo svg {
        width: 100px;
        height: auto;
      }

      .jupyterlite-moon {
        position: absolute;
        top: 50%;
        left: 50%;
        border-radius: 50%;
      }

      #jupyterlite-moon1 {
        width: 200px;
        height: 140px;
        margin-top: -53px;
        margin-left: -54px;
        animation: jupyterlite-orbit 2s linear infinite;
      }

      #jupyterlite-moon2 {
        width: 132px;
        height: 180px;
        margin-top: -66px;
        margin-left: -85px;
        animation: jupyterlite-orbit 2.5s linear infinite reverse;
      }

      #jupyterlite-moon3 {
        width: 220px;
        height: 166px;
        margin-top: -96px;
        margin-left: -50px;
        animation: jupyterlite-orbit 3s linear infinite;
      }

      .jupyterlite-planet {
        border-radius: 50%;
      }

      #jupyterlite-moon1 .jupyterlite-planet {
        width: 12px;
        height: 12px;
      }

      #jupyterlite-moon2 .jupyterlite-planet {
        width: 16px;
        height: 16px;
        float: right;
      }

      #jupyterlite-moon3 .jupyterlite-planet {
        width: 20px;
        height: 20px;
      }

      /* Light theme planet colors */
      #jupyterlite-moon1 .jupyterlite-planet {
        background-color: #6f7070;
      }

      #jupyterlite-moon2 .jupyterlite-planet {
        background-color: #767677;
      }

      #jupyterlite-moon3 .jupyterlite-planet {
        background-color: #989798;
      }

      /* Dark theme planet colors */
      body.jp-mod-dark #jupyterlite-moon1 .jupyterlite-planet,
      body.jp-mod-dark #jupyterlite-moon2 .jupyterlite-planet,
      body.jp-mod-dark #jupyterlite-moon3 .jupyterlite-planet {
        background-color: white;
      }

      @keyframes jupyterlite-orbit {
        0%   { transform: rotateZ(0deg); }
        100% { transform: rotateZ(-720deg); }
      }

      @keyframes jupyterlite-fade-out {
        0%   { opacity: 1; }
        100% { opacity: 0; }
      }

      .jupyterlite-loading-indicator-text {
        position: absolute;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 16px;
        color: #616161;
      }

      body.jp-mod-dark .jupyterlite-loading-indicator-text {
        color: #bdbdbd;
      }
    </style>
  </head>
<body>
</body></html>

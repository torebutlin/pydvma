<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pydvma web logger</title>
    <!-- Stamp the effective theme before first paint so there is no
         light-flash on a dark preference (mirrors lib/stores/theme.ts). -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('pydvma-theme');
          var dark = p
            ? p === 'dark'
            : window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
